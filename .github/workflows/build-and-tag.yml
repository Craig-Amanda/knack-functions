name: Build dist, write SRI, and auto-tag

on:
  push:
    branches: [ main ]
    # Only run when source / config changes; ignore dist to avoid loops
    paths:
      - 'knackFunctions.js'
      - 'src/**'
      - 'builds/**'
      - 'rollup.config.*'
      - 'vite.config.*'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: dist-update
  cancel-in-progress: false

jobs:
  build-and-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build bundle (Rollup)
        run: npm run build

      - name: Verify output exists
        run: test -f dist/knackFunctions.global.min.js


      - name: Generate SRI sidecar (.sha384)
        id: sri
        shell: bash
        run: |
          HASH=$(openssl dgst -sha384 -binary dist/knackFunctions.global.min.js | openssl base64 -A)
          printf "sha384-%s" "$HASH" > dist/knackFunctions.global.min.js.sha384
          echo "sri=sha384-$HASH" >> $GITHUB_OUTPUT


      - name: Optional manifest (version + SRI)
        shell: bash
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > dist/knackFunctions.manifest.json <<EOF
          {
            "name": "knack-functions",
            "file": "dist/knackFunctions.global.min.js",
            "sri": "${{ steps.sri.outputs.sri }}",
            "commit": "$COMMIT",
            "builtAt": "$DATE"
          }
          EOF

      - name: Update changelog from merged pull request
        id: changelog
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const changelogPath = 'CHANGELOG.md';

            function stripHtmlComments(value) {
              return (value || '').replace(/<!--[\s\S]*?-->/g, '').replace(/\r/g, '');
            }

            function trimEmptyLines(lines) {
              let start = 0;
              let end = lines.length;

              while (start < end && !lines[start].trim()) {
                start += 1;
              }

              while (end > start && !lines[end - 1].trim()) {
                end -= 1;
              }

              return lines.slice(start, end);
            }

            function extractNamedSection(body) {
              const lines = stripHtmlComments(body).split('\n');
              const sectionPattern = /^#{1,6}\s*(changelog|summary|changes)\s*$/i;

              for (let index = 0; index < lines.length; index += 1) {
                if (!sectionPattern.test(lines[index].trim())) {
                  continue;
                }

                const collected = [];
                for (let innerIndex = index + 1; innerIndex < lines.length; innerIndex += 1) {
                  if (/^#{1,6}\s+/.test(lines[innerIndex].trim())) {
                    break;
                  }
                  collected.push(lines[innerIndex]);
                }

                const trimmed = trimEmptyLines(collected);
                if (trimmed.length) {
                  return trimmed.join('\n');
                }
              }

              return '';
            }

            function toEntries(sectionText) {
              const lines = trimEmptyLines(stripHtmlComments(sectionText).split('\n'));
              const bulletEntries = lines
                .map((line) => line.trim())
                .filter(Boolean)
                .filter((line) => /^([-*+]|\d+\.)\s+/.test(line))
                .map((line) => line.replace(/^([-*+]|\d+\.)\s+/, '').replace(/^\[[ xX]\]\s*/, '').trim())
                .filter(Boolean);

              if (bulletEntries.length) {
                return bulletEntries;
              }

              const paragraphEntries = stripHtmlComments(sectionText)
                .split(/\n\s*\n/)
                .map((paragraph) => paragraph.split('\n').map((line) => line.trim()).filter(Boolean).join(' '))
                .filter(Boolean);

              if (paragraphEntries.length) {
                return [paragraphEntries[0]];
              }

              return [];
            }

            const { owner, repo } = context.repo;
            const response = await github.request('GET /repos/{owner}/{repo}/commits/{commit_sha}/pulls', {
              owner,
              repo,
              commit_sha: context.sha,
              mediaType: {
                previews: ['groot']
              }
            });

            const mergedPullRequest = response.data.find((pullRequest) => pullRequest.merged_at && pullRequest.base?.ref === 'main');

            if (!mergedPullRequest) {
              core.info('No merged pull request was associated with this push.');
              core.setOutput('changed', 'false');
              return;
            }

            const changelogSource = extractNamedSection(mergedPullRequest.body || '');
            const changelogEntries = toEntries(changelogSource);
            const finalEntries = changelogEntries.length
              ? changelogEntries
              : [mergedPullRequest.title.trim()];
            const authorSuffix = mergedPullRequest.user?.login ? ` (by @${mergedPullRequest.user.login})` : '';

            const marker = `<!-- pr:${mergedPullRequest.number} -->`;
            const dateHeading = `## ${new Date().toISOString().slice(0, 10)}`;
            const entryBlock = `${marker}\n${finalEntries.map((entry) => `- ${entry}${authorSuffix}`).join('\n')}`;
            const existingContent = fs.readFileSync(changelogPath, 'utf8').replace(/\r/g, '');

            if (existingContent.includes(marker)) {
              core.info(`CHANGELOG already includes PR #${mergedPullRequest.number}.`);
              core.setOutput('changed', 'false');
              return;
            }

            let updatedContent;

            if (existingContent.includes(dateHeading)) {
              updatedContent = existingContent.replace(dateHeading, `${dateHeading}\n\n${entryBlock}`);
            } else {
              updatedContent = existingContent.replace(/^# Changelog\s*\n*/, (match) => `${match.trimEnd()}\n\n${dateHeading}\n\n${entryBlock}\n\n`);
            }

            if (updatedContent === existingContent) {
              core.info('CHANGELOG did not change.');
              core.setOutput('changed', 'false');
              return;
            }

            fs.writeFileSync(changelogPath, updatedContent.endsWith('\n') ? updatedContent : `${updatedContent}\n`);
            core.info(`Added changelog entry for merged PR #${mergedPullRequest.number}.`);
            core.setOutput('changed', 'true');

      - name: Commit and push generated files if changed
        id: commitgenerated
        run: |
          DIST_CHANGED=false
          CHANGELOG_CHANGED=false

          if [ -n "$(git status --porcelain dist)" ]; then
            DIST_CHANGED=true
          fi

          if [ -n "$(git status --porcelain CHANGELOG.md)" ]; then
            CHANGELOG_CHANGED=true
          fi

          if [ "$DIST_CHANGED" = "true" ] || [ "$CHANGELOG_CHANGED" = "true" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            if [ "$DIST_CHANGED" = "true" ]; then
              git add dist
            fi

            if [ "$CHANGELOG_CHANGED" = "true" ]; then
              git add CHANGELOG.md
            fi

            if [ "$DIST_CHANGED" = "true" ] && [ "$CHANGELOG_CHANGED" = "true" ]; then
              COMMIT_MESSAGE="chore(release): update dist and changelog [skip ci]"
            elif [ "$DIST_CHANGED" = "true" ]; then
              COMMIT_MESSAGE="build(dist): update bundle and SRI [skip ci]"
            else
              COMMIT_MESSAGE="docs(changelog): update merged PR notes [skip ci]"
            fi

            git commit -m "$COMMIT_MESSAGE"
            git pull --rebase origin main
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "No generated file changes to commit."
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

          echo "dist_changed=$DIST_CHANGED" >> $GITHUB_OUTPUT
          echo "changelog_changed=$CHANGELOG_CHANGED" >> $GITHUB_OUTPUT

      - name: Compute next SemVer tag (major/minor/patch)
        id: nexttag
        if: steps.commitgenerated.outputs.dist_changed == 'true'
        shell: bash
        run: |
          # Find last semver tag (vX.Y.Z); if none, start from v0.0.0
          LAST_TAG=$(git tag -l "v[0-9]*" --sort=-v:refname | head -n 1)
          [ -z "$LAST_TAG" ] && LAST_TAG="v0.0.0"

          # Gather commit messages since last tag (includes the merge & bot's dist commit)
          MESSAGES=$(git log --format=%B "${LAST_TAG}..HEAD" || true)

          # Decide bump: BREAKING → major, feat → minor, else patch
          BUMP="patch"
          echo "$MESSAGES" | grep -qE 'BREAKING CHANGE|!:' && BUMP="major"
          if [ "$BUMP" = "patch" ]; then
            echo "$MESSAGES" | grep -qiE '^feat(\(|:)|\bfeature\b' && BUMP="minor"
          fi

          # Parse LAST_TAG and bump
          VER="${LAST_TAG#v}"
          IFS=. read -r MAJOR MINOR PATCH <<EOF
          $VER
          EOF
          MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}

          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "bump=$BUMP"     >> $GITHUB_OUTPUT
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Create and push tag
        if: steps.commitgenerated.outputs.dist_changed == 'true'
        run: |
          TAG="${{ steps.nexttag.outputs.new_tag }}"
          echo "Tagging $TAG"
          git tag -a "$TAG" -m "Release $TAG (SRI ${{ steps.sri.outputs.sri }})"
          git push origin "$TAG"
